<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetsuo Type Tool</title>
  <!-- Google Fonts: all 11 curated families -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant:ital,wght@0,300..700;1,300..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Eczar:wght@400..800&family=Fira+Sans:ital,wght@0,100;0,300;0,400;0,700;0,900;1,400&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inknut+Antiqua:wght@300;400;700;900&family=Poppins:ital,wght@0,100;0,300;0,400;0,700;0,900;1,400&family=Rubik:ital,wght@0,300..900;1,300..900&family=Spectral:ital,wght@0,200;0,400;0,700;0,800;1,400&family=Syne:wght@400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- ── Splash screen ── -->
  <div id="splash">
    <img src="/img/tetsuo-the-iron-man.webp" alt="" draggable="false">
  </div>

  <!-- ── Toolbar ── -->
  <div id="toolbar">
    <div class="toolbar-group">
      <select id="font-picker"></select>
      <select id="weight-picker"></select>
      <input type="number" id="size-picker" value="120" min="12" max="800" step="4">
      <span class="size-unit">px</span>
      <input type="color" id="color-picker" value="#000000" title="Text color">
      <input type="number" id="tracking-picker" value="0" min="-20" max="50" step="1" title="Letter spacing">
      <span class="size-unit">ls</span>
    </div>
    <div class="toolbar-group toolbar-right">
      <select id="preset-picker" title="Effect presets">
        <option value="">Presets…</option>
      </select>
      <button id="btn-liquify" title="Liquify brush — drag to push type (L)" class="tool-btn">✦</button>
      <button id="btn-particles" title="Chaos mode (⬡)">⬡</button>
    </div>
  </div>

  <!-- ── Canvas area ── -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <canvas id="gl" class="gl-overlay"></canvas>
    <canvas id="three-overlay" class="gl-overlay"></canvas>
    <canvas id="overlay" class="overlay-canvas"></canvas>
    <input type="text" id="live-type-input" spellcheck="false" autocomplete="off" aria-label="Live type input">
  </div>

  <!-- ── Effects panel ── -->
  <div id="effects-panel">
    <!-- ── Color section ── -->
    <div class="panel-header">
      <span class="panel-title">Color</span>
    </div>
    <div id="palette-row" class="palette-row"></div>
    <div class="fx-group">
      <label class="fx-label"><span>Gradient</span><span class="fx-val" id="v-gradient">0</span></label>
      <input type="range" class="fx-slider" id="fx-gradient" min="0" max="100" value="0" title="Push palette color through the type">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Solarize</span><span class="fx-val" id="v-solarize">0</span></label>
      <input type="range" class="fx-slider" id="fx-solarize" min="0" max="100" value="0" title="Sabattier effect — partial tone inversion">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Chroma</span><span class="fx-val" id="v-chroma">0</span></label>
      <input type="range" class="fx-slider" id="fx-chroma" min="0" max="100" value="0" title="RGB channel separation — cheap lens aberration">
    </div>

    <!-- ── Texture section ── -->
    <div class="panel-header">
      <span class="panel-title">Texture</span>
      <button id="btn-reset-fx" class="panel-btn">Reset</button>
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Stress</span><span class="fx-val" id="v-stress">0</span></label>
      <input type="range" class="fx-slider" id="fx-stress" min="0" max="100" value="0" title="Spread and thicken dark areas — ink under pressure">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Noise</span><span class="fx-val" id="v-noise">0</span></label>
      <input type="range" class="fx-slider" id="fx-noise" min="0" max="100" value="0" title="Film grain isolated to type — silver halide clusters">
    </div>
    <div class="fx-sub-controls" id="noise-sub-controls">
      <div class="fx-group fx-sub">
        <label class="fx-label"><span>Speed</span><span class="fx-val" id="v-noise-speed">30</span></label>
        <input type="range" class="fx-slider" id="fx-noise-speed" min="0" max="100" value="30" title="Grain animation speed — 0 = frozen, 100 = frenetic">
      </div>
      <div class="fx-group fx-sub">
        <label class="fx-label"><span>Scale</span><span class="fx-val" id="v-noise-scale">50</span></label>
        <input type="range" class="fx-slider" id="fx-noise-scale" min="0" max="100" value="50" title="Grain size — low = fine dust, high = coarse gravel">
      </div>
      <div class="fx-group fx-sub">
        <label class="fx-label"><span>Organic</span><span class="fx-val" id="v-noise-organic">40</span></label>
        <input type="range" class="fx-slider" id="fx-noise-organic" min="0" max="100" value="40" title="FBM complexity — low = digital hash, high = flowing, organic pattern">
      </div>
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Blur</span><span class="fx-val" id="v-blur">0</span></label>
      <input type="range" class="fx-slider" id="fx-blur" min="0" max="100" value="0" title="Soft gaussian blur — ink bleeding into paper">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Erode</span><span class="fx-val" id="v-erode">0</span></label>
      <input type="range" class="fx-slider" id="fx-erode" min="0" max="100" value="0" title="Dissolve edges inward — acid-etched metal">
    </div>

    <!-- ── Distortion section ── -->
    <div class="panel-header">
      <span class="panel-title">Distortion</span>
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Warp</span><span class="fx-val" id="v-warp">0</span></label>
      <input type="range" class="fx-slider" id="fx-warp" min="0" max="100" value="0" title="Viscous spatial distortion — printed on liquid">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Halftone</span><span class="fx-val" id="v-halftone">0</span></label>
      <input type="range" class="fx-slider" id="fx-halftone" min="0" max="100" value="0" title="CMYK dot screen — classic print reproduction">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Shimmer</span><span class="fx-val" id="v-shimmer">0</span></label>
      <input type="range" class="fx-slider" id="fx-shimmer" min="0" max="100" value="0" title="Heat shimmer — light bending above hot pavement">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Pixel Sort</span><span class="fx-val" id="v-pixelsort">0</span></label>
      <input type="range" class="fx-slider" id="fx-pixelsort" min="0" max="100" value="0" title="Pixel sorting — glitch art classic, streaks of reorganized data">
    </div>

    <!-- ── Tone section ── -->
    <div class="panel-header">
      <span class="panel-title">Tone</span>
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Threshold</span><span class="fx-val" id="v-threshold">50</span></label>
      <input type="range" class="fx-slider" id="fx-threshold" min="0" max="100" value="50" title="Ink/paper cutoff — below 50 thins, above 50 thickens">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Emboss</span><span class="fx-val" id="v-emboss">0</span></label>
      <input type="range" class="fx-slider" id="fx-emboss" min="0" max="100" value="0" title="Directional lighting on letterform surface">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Glitch</span><span class="fx-val" id="v-glitch">0</span></label>
      <input type="range" class="fx-slider" id="fx-glitch" min="0" max="100" value="0" title="Scan line displacement — digital signal corruption">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Bloom</span><span class="fx-val" id="v-bloom">0</span></label>
      <input type="range" class="fx-slider" id="fx-bloom" min="0" max="100" value="0" title="Luminous glow bleeding from edges — overexposed film">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Scanlines</span><span class="fx-val" id="v-scanlines">0</span></label>
      <input type="range" class="fx-slider" id="fx-scanlines" min="0" max="100" value="0" title="CRT scan lines — cathode ray tube monitor">
    </div>
    <div class="fx-group">
      <label class="fx-label"><span>Vignette</span><span class="fx-val" id="v-vignette">0</span></label>
      <input type="range" class="fx-slider" id="fx-vignette" min="0" max="100" value="0" title="Darkened edges — camera lens falloff">
    </div>
  </div>

  <!-- ── Bottom bar ── -->
  <div id="bottombar">
    <span id="status">Ready</span>
    <button id="btn-invert" title="Toggle dark canvas">◑</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-export">Export PNG</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
